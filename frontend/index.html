<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoScape</title>
    <script>
      (function () {
        var theme = null;
        try {
          theme = window.localStorage.getItem("autoscape.theme");
        } catch (error) {
          theme = null;
        }

        if (!theme) {
          var prefersDark = false;
          try {
            prefersDark =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
          } catch (error) {
            prefersDark = false;
          }
          theme = prefersDark ? "dark-default" : "light-default";
        }

        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
